<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Siswa — ExamSafe</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🎓 Exam<span>Safe</span></div>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="create-exam.html" class="nav-link">Buat Ujian</a>
      <a href="results.html" class="nav-link">Hasil Ujian</a>
      <div class="nav-user">
        <div class="nav-avatar">G</div>
        <span>Guru</span>
      </div>
        <a
          href="../php/logout.php"
          class="btn btn-sm btn-outline"
          style="color: #fff; border-color: rgba(255, 255, 255, 0.4)"
          >Keluar</a
        >
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a></li>
        <li><a href="create-exam.html"><span class="icon">➕</span> Buat Ujian Baru</a></li>
        <li><a href="results.html"><span class="icon">📊</span> Hasil Ujian</a></li>
        <li><a href="students.html" class="active"><span class="icon">👥</span> Data Siswa</a></li>
        <li><a href="settings.html"><span class="icon">⚙️</span> Pengaturan</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">👥 Data Siswa</div>
          <div class="page-subtitle">Daftar siswa di kelas yang Anda ampu</div>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Lengkap</th>
                <th>NISN</th>
                <th>Kelas</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="student-list">
              <tr><td colspan="5" style="text-align:center;padding:20px">Memuat data siswa...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetchStudents();
      fetchProfile();
    });

    async function fetchProfile() {
      try {
        const response = await fetch('../php/exam_api.php?action=get_profile');
        const data = await response.json();
        if (data.success) {
          const user = data.user;
          document.querySelector('.nav-user span').textContent = user.full_name + (user.gelar ? ', ' + user.gelar : '');
          document.querySelector('.nav-avatar').textContent = user.full_name.charAt(0).toUpperCase();
        }
      } catch (e) {}
    }

    async function fetchStudents() {
      try {
        const response = await fetch('../php/exam_api.php?action=get_students');
        const data = await response.json();
        
        const tbody = document.getElementById('student-list');
        if (data.success) {
          if (data.students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px">Belum ada data siswa di kelas Anda.</td></tr>';
            return;
          }
          tbody.innerHTML = data.students.map((s, i) => `
            <tr>
              <td>${i + 1}</td>
              <td><b>${s.full_name}</b></td>
              <td>${s.nisn}</td>
              <td>${s.class}</td>
              <td><span class="badge badge-success">Aktif</span></td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;padding:20px">${data.message}</td></tr>`;
        }
      } catch (error) {
        console.error('Error fetching students:', error);
      }
    }
  </script>
</body>
</html>
