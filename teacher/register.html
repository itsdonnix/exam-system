<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Guru — ExamSafe</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="register-wrapper">
      <div class="register-logo">
        <h1>🎓 Exam<span>Safe</span></h1>
        <p>Pendaftaran Akun Guru</p>
      </div>

      <div class="register-card">
        <div class="step-dots">
          <div class="dot active" id="dot-1"></div>
          <div class="dot" id="dot-2"></div>
          <div class="dot" id="dot-3"></div>
        </div>

        <div id="alert-box"></div>

        <!-- Step 1: Data Pribadi -->
        <div id="reg-step-1">
          <div class="step-title">Data Pribadi</div>
          <div class="step-subtitle">Langkah 1 dari 3</div>

          <div class="form-row">
            <div class="form-group">
              <label>Nama Depan *</label>
              <input
                type="text"
                class="form-control"
                id="fname"
                placeholder="Nama depan"
                required
              />
            </div>
            <div class="form-group">
              <label>Gelar (S.Pd, M.Pd, dll) *</label>
              <input
                type="text"
                class="form-control"
                id="gelar"
                placeholder="Contoh: S.Pd"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label>Nama Belakang *</label>
            <input
              type="text"
              class="form-control"
              id="lname"
              placeholder="Nama belakang"
              required
            />
          </div>
          <div class="form-group">
            <label>Email .id.Belajar *</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="nama@guru.sma.belajar.id"
              required
            />
          </div>
          <div class="form-group">
            <label>Nomor HP</label>
            <input
              type="tel"
              class="form-control"
              id="phone"
              placeholder="08xxxxxxxxxx"
            />
          </div>
          <button class="btn btn-primary btn-block mt-2" onclick="nextStep()">
            Lanjut →
          </button>
        </div>

        <!-- Step 2: Data Mengajar -->
        <div id="reg-step-2" style="display: none">
          <div class="step-title">Data Mengajar</div>
          <div class="step-subtitle">Langkah 2 dari 3</div>

          <div class="form-group">
            <label>Mata Pelajaran yang Diajar *</label>
            <select class="form-control" id="subject" required>
              <option value="">-- Pilih Mata Pelajaran --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nama Sekolah *</label>
            <input
              type="text"
              class="form-control input-readonly"
              id="school"
              value="SMA Kristen Mercusuar Kupang"
              readonly
            />
          </div>
          <div class="nav-buttons">
            <button class="btn btn-outline nav-btn-flex-1" onclick="prevStep()">
              ← Kembali
            </button>
            <button class="btn btn-primary nav-btn-flex-2" onclick="nextStep()">
              Lanjut →
            </button>
          </div>
        </div>

        <!-- Step 3: Buat Password -->
        <div id="reg-step-3" style="display: none">
          <div class="step-title">Buat Password</div>
          <div class="step-subtitle">Langkah 3 dari 3</div>

          <div class="form-group">
            <label>Password *</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Minimal 8 karakter"
              required
            />
            <div id="pw-strength" class="pw-strength"></div>
          </div>
          <div class="form-group">
            <label>Konfirmasi Password *</label>
            <input
              type="password"
              class="form-control"
              id="password2"
              placeholder="Ulangi password"
              required
            />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="agree" class="checkbox-input" />
              Saya menyetujui
              <a href="#" class="login-link login-link-primary-light"
                >Syarat & Ketentuan</a
              >
              penggunaan sistem ExamSafe
            </label>
          </div>
          <div class="alert alert-info">
            ℹ️ Akun Anda akan diverifikasi oleh admin sekolah sebelum dapat
            digunakan. Proses verifikasi 1-2 hari kerja.
          </div>

          <div class="action-buttons">
            <button class="btn btn-outline" onclick="prevStep()">
              ← Kembali
            </button>
            <button
              class="btn btn-primary"
              id="submit-btn"
              onclick="submitRegister()"
            >
              Kirim Pendaftaran
            </button>
          </div>

          <div class="login-link-section-sm">
            Sudah punya akun?
            <a href="../index.php" class="login-link login-link-primary-light"
              >Login di sini</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script src="../js/register-common.js"></script>
    <script>
      // Initialize wizard
      const wizard = RegisterWizard;
      wizard.init(3);

      // Load subjects on page load
      RegisterAPI.fetchSubjects("subject");

      // Password strength checker
      const passwordInput = document.getElementById("password");
      const strengthDiv = document.getElementById("pw-strength");

      if (passwordInput) {
        passwordInput.addEventListener("input", function () {
          const validation = RegisterValidation.validatePasswordStrength(
            this.value
          );
          const strengthText = RegisterValidation.getPasswordStrengthText(
            validation.strength
          );
          strengthDiv.innerHTML = `<span style="color: ${strengthText.color}">${strengthText.text}</span>`;
        });
      }

      // Step validation callbacks
      function validateStep1() {
        const fname = document.getElementById("fname").value.trim();
        const lname = document.getElementById("lname").value.trim();
        const gelar = document.getElementById("gelar").value.trim();
        const email = document.getElementById("email").value.trim();

        if (!fname) {
          RegisterUI.showAlert("alert-box", "Nama depan wajib diisi", "danger");
          return false;
        }
        if (!lname) {
          RegisterUI.showAlert(
            "alert-box",
            "Nama belakang wajib diisi",
            "danger"
          );
          return false;
        }
        if (!gelar) {
          RegisterUI.showAlert("alert-box", "Gelar wajib diisi", "danger");
          return false;
        }

        const emailValidation = RegisterValidation.validateEmail(
          email,
          ".belajar.id"
        );
        if (emailValidation) {
          RegisterUI.showAlert("alert-box", emailValidation, "danger");
          return false;
        }

        RegisterUI.clearAlert("alert-box");
        return true;
      }

      function validateStep2() {
        const subject = document.getElementById("subject").value;

        if (!subject) {
          RegisterUI.showAlert(
            "alert-box",
            "Mata pelajaran wajib dipilih",
            "danger"
          );
          return false;
        }

        RegisterUI.clearAlert("alert-box");
        return true;
      }

      function nextStep() {
        if (wizard.currentStep === 1 && !validateStep1()) return;
        if (wizard.currentStep === 2 && !validateStep2()) return;

        wizard.nextStep();
      }

      function prevStep() {
        wizard.prevStep();
      }

      async function submitRegister() {
        RegisterUI.clearAlert("alert-box");

        // Validate all steps
        if (!validateStep1() || !validateStep2()) return;

        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;
        const agree = document.getElementById("agree").checked;

        const passwordValidation =
          RegisterValidation.validatePasswordStrength(password);
        if (!passwordValidation.valid) {
          RegisterUI.showAlert(
            "alert-box",
            passwordValidation.message,
            "danger"
          );
          return;
        }

        const confirmValidation = RegisterValidation.validateConfirmPassword(
          password,
          password2
        );
        if (confirmValidation) {
          RegisterUI.showAlert("alert-box", confirmValidation, "danger");
          return;
        }

        if (!agree) {
          RegisterUI.showAlert(
            "alert-box",
            "Centang persetujuan syarat & ketentuan",
            "danger"
          );
          return;
        }

        const submitBtn = document.getElementById("submit-btn");
        RegisterUI.setLoading(submitBtn, true, "Kirim Pendaftaran");

        const formData = {
          fname: document.getElementById("fname").value.trim(),
          lname: document.getElementById("lname").value.trim(),
          gelar: document.getElementById("gelar").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          subject: document.getElementById("subject").value,
          school: document.getElementById("school").value,
          password: password,
        };

        try {
          const result = await RegisterAPI.registerTeacher(formData);

          if (result.success) {
            // Show success message
            document.getElementById("reg-step-3").innerHTML = `
            <div class="register-success">
              <div class="register-success-icon">🎉</div>
              <h3 class="register-success-title" style="color: var(--success);">Pendaftaran Berhasil!</h3>
              <p class="register-success-message">Akun Anda sedang menunggu verifikasi admin. Kami akan mengirim email konfirmasi ke <b>${
                result.email || formData.email
              }</b></p>
              <a href="../index.php" class="btn btn-primary btn-block">← Kembali ke Login</a>
            </div>
          `;
            // Mark all dots as done
            for (let i = 1; i <= 3; i++) {
              const dot = document.getElementById(`dot-${i}`);
              if (dot) dot.className = "dot done";
            }
          } else {
            RegisterUI.showAlert("alert-box", `❌ ${result.message}`, "danger");
            RegisterUI.setLoading(submitBtn, false, "Kirim Pendaftaran");
          }
        } catch (error) {
          console.error("Register error:", error);
          RegisterUI.showAlert(
            "alert-box",
            "❌ Terjadi kesalahan koneksi ke server.",
            "danger"
          );
          RegisterUI.setLoading(submitBtn, false, "Kirim Pendaftaran");
        }
      }
    </script>
  </body>
</html>
