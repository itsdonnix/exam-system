<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Siswa — ExamSafe</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="register-wrapper">
      <div class="register-logo">
        <h1>🎓 Exam<span>Safe</span></h1>
        <p>Pendaftaran Akun Siswa</p>
      </div>

      <div class="register-card">
        <div id="alert-box"></div>

        <form id="reg-form" onsubmit="submitRegister(event)">
          <div class="form-group">
            <label>Nama Lengkap *</label>
            <input
              type="text"
              id="fullname"
              class="form-control"
              placeholder="Nama sesuai ijazah"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>NISN *</label>
              <input
                type="text"
                id="nisn"
                class="form-control"
                placeholder="10 digit NISN"
                required
              />
            </div>
            <div class="form-group">
              <label>Kelas *</label>
              <select id="class" class="form-control" required>
                <option value="">-- Pilih Kelas --</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Username *</label>
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Untuk login (bebas)"
              required
            />
          </div>
          <div class="form-group">
            <label>Password *</label>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Minimal 6 karakter"
              required
            />
            <div id="pw-strength" class="pw-strength"></div>
          </div>

          <div class="alert alert-info alert-info-sm">
            ℹ️ Akun Anda akan aktif setelah disetujui oleh Admin Sekolah.
          </div>

          <button
            type="submit"
            id="submit-btn"
            class="btn btn-primary btn-block btn-lg"
          >
            Daftar Akun
          </button>
        </form>

        <div class="login-link-section">
          Sudah punya akun?
          <a href="../index.php" class="login-link login-link-primary">Login</a>
        </div>
      </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script src="../js/register-common.js"></script>
    <script>
      // Load classes on page load
      RegisterAPI.fetchClasses("class");

      // Password strength checker
      const passwordInput = document.getElementById("password");
      const strengthDiv = document.getElementById("pw-strength");

      passwordInput.addEventListener("input", function () {
        const validation = RegisterValidation.validatePasswordStrength(
          this.value
        );
        const strengthText = RegisterValidation.getPasswordStrengthText(
          validation.strength
        );
        strengthDiv.innerHTML = `<span style="color: ${strengthText.color}">${strengthText.text}</span>`;
      });

      async function submitRegister(e) {
        e.preventDefault();

        const alertBox = "alert-box";
        RegisterUI.clearAlert(alertBox);

        // Validate form
        const fullname = document.getElementById("fullname").value.trim();
        const nisn = document.getElementById("nisn").value.trim();
        const studentClass = document.getElementById("class").value;
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!fullname) {
          RegisterUI.showAlert(alertBox, "Nama lengkap wajib diisi", "danger");
          return;
        }

        if (!nisn) {
          RegisterUI.showAlert(alertBox, "NISN wajib diisi", "danger");
          return;
        }

        if (nisn.length < 10) {
          RegisterUI.showAlert(alertBox, "NISN minimal 10 digit", "danger");
          return;
        }

        if (!studentClass) {
          RegisterUI.showAlert(alertBox, "Kelas wajib dipilih", "danger");
          return;
        }

        if (!username) {
          RegisterUI.showAlert(alertBox, "Username wajib diisi", "danger");
          return;
        }

        const passwordValidation =
          RegisterValidation.validatePasswordStrength(password);
        if (!passwordValidation.valid) {
          RegisterUI.showAlert(alertBox, passwordValidation.message, "danger");
          return;
        }

        const submitBtn = document.getElementById("submit-btn");
        RegisterUI.setLoading(submitBtn, true, "Daftar Akun");

        try {
          const result = await RegisterAPI.registerStudent({
            full_name: fullname,
            nisn: nisn,
            class: studentClass,
            username: username,
            password: password,
          });

          if (result.success) {
            // Show success message
            document.querySelector(".register-card").innerHTML = `
            <div class="register-success">
              <div class="register-success-icon">⏳</div>
              <h3 class="register-success-title">Pendaftaran Terkirim!</h3>
              <p class="register-success-message">Akun Anda sedang menunggu persetujuan Admin. Silakan cek secara berkala atau hubungi wali kelas.</p>
              <a href="../index.php" class="btn btn-primary btn-block">Kembali ke Login</a>
            </div>
          `;
          } else {
            RegisterUI.showAlert(alertBox, `❌ ${result.message}`, "danger");
            RegisterUI.setLoading(submitBtn, false, "Daftar Akun");
          }
        } catch (error) {
          RegisterUI.showAlert(
            alertBox,
            "❌ Kesalahan koneksi ke server.",
            "danger"
          );
          RegisterUI.setLoading(submitBtn, false, "Daftar Akun");
        }
      }
    </script>
  </body>
</html>
