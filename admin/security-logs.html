<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Keamanan — Admin ExamSafe</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div style="display: flex; align-items: center; gap: 12px">
        <button
          class="hamburger-btn"
          id="hamburgerBtn"
          aria-label="Toggle menu"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="navbar-brand">
          🎓 Exam<span>Safe</span>
          <span
            style="
              font-size: 0.75rem;
              background: rgba(255, 255, 255, 0.2);
              padding: 2px 8px;
              border-radius: 50px;
              margin-left: 8px;
            "
            >ADMIN</span
          >
        </div>
      </div>
      <div class="navbar-nav">
        <div class="nav-user">
          <div class="nav-avatar" style="background: var(--accent)">A</div>
          <span>Administrator</span>
        </div>
        <a
          href="../php/logout.php"
          class="btn btn-sm btn-outline"
          style="color: #fff; border-color: rgba(255, 255, 255, 0.4)"
          >Keluar</a
        >
      </div>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-avatar-section">
          <div
            class="sidebar-avatar"
            id="sidebarAvatar"
            style="background: var(--accent)"
          >
            A
          </div>
          <div class="sidebar-avatar-name" id="sidebarAvatarName">
            Administrator
          </div>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
          </li>
          <li>
            <a href="teachers.html"><span class="icon">👨‍🏫</span> Kelola Guru</a>
          </li>
          <li>
            <a href="students.html"
              ><span class="icon">👨‍🎓</span> Kelola Siswa</a
            >
          </li>
          <li>
            <a href="exams.html"><span class="icon">📝</span> Semua Ujian</a>
          </li>
          <li>
            <a href="reports.html"><span class="icon">📊</span> Laporan</a>
          </li>
          <li>
            <a href="settings.html"><span class="icon">⚙️</span> Pengaturan</a>
          </li>
          <li>
            <a href="security-logs.html" class="active"
              ><span class="icon">🔒</span> Log Keamanan</a
            >
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <div>
            <div class="page-title">🔒 Log Keamanan</div>
            <div class="page-subtitle">
              Daftar pelanggaran siswa selama ujian
            </div>
          </div>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Waktu</th>
                  <th>Nama Siswa</th>
                  <th>Ujian</th>
                  <th>Pelanggaran</th>
                </tr>
              </thead>
              <tbody id="log-list">
                <tr>
                  <td colspan="4" style="text-align: center; padding: 20px">
                    Memuat data log keamanan...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetchLogs();
        fetchAdminProfile();
      });

      const hamburgerBtn = document.getElementById("hamburgerBtn");
      const sidebar = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebarOverlay");

      hamburgerBtn.addEventListener("click", () => {
        sidebar.classList.toggle("sidebar-open");
        sidebarOverlay.classList.toggle("sidebar-overlay-visible");
      });

      sidebarOverlay.addEventListener("click", () => {
        sidebar.classList.remove("sidebar-open");
        sidebarOverlay.classList.remove("sidebar-overlay-visible");
      });

      async function fetchAdminProfile() {
        try {
          const response = await fetch(
            "../php/admin_api.php?action=get_admin_profile"
          );
          const data = await response.json();
          if (data.success) {
            document.querySelector(".nav-user span").textContent =
              data.user.full_name;
            document.querySelector(".nav-avatar").textContent =
              data.user.full_name.charAt(0).toUpperCase();
            const sidebarAvatar = document.getElementById("sidebarAvatar");
            const sidebarAvatarName =
              document.getElementById("sidebarAvatarName");
            if (sidebarAvatar)
              sidebarAvatar.textContent = data.user.full_name
                .charAt(0)
                .toUpperCase();
            if (sidebarAvatarName)
              sidebarAvatarName.textContent = data.user.full_name;
          }
        } catch (e) {}
      }

      async function fetchLogs() {
        try {
          const response = await fetch(
            "../php/admin_api.php?action=get_security_logs"
          );
          const data = await response.json();

          const tbody = document.getElementById("log-list");
          if (data.success) {
            if (data.logs.length === 0) {
              tbody.innerHTML =
                '<tr><td colspan="4" style="text-align:center;padding:20px">Belum ada catatan pelanggaran.</td></tr>';
              return;
            }
            tbody.innerHTML = data.logs
              .map(
                (l, i) => `
            <tr>
              <td>${new Date(l.created_at).toLocaleString("id-ID")}</td>
              <td><b>${l.student_name}</b></td>
              <td>${l.exam_name}</td>
              <td><span class="badge badge-danger">${l.reason}</span></td>
            </tr>
          `
              )
              .join("");
          }
        } catch (error) {
          console.error("Error fetching logs:", error);
        }
      }
    </script>
  </body>
</html>
